<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <title>Feature branch flows through CI to a preview URL; main flows through CI to production</title>
  <style>svg { color: #3f3f46; } @media (prefers-color-scheme: dark) { svg { color: #d4d4d8; } }</style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor" />
    </marker>
  </defs>

  <!-- Row 1: feature branch -->
  <rect x="10" y="30" width="120" height="46" rx="10" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" />
  <text x="70" y="58" font-size="12" text-anchor="middle" fill="currentColor">feature branch</text>

  <line x1="130" y1="53" x2="188" y2="53" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="190" y="20" width="140" height="66" rx="10" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" />
  <text x="260" y="48" font-size="12" text-anchor="middle" fill="currentColor">CI build</text>
  <text x="260" y="64" font-size="10.5" text-anchor="middle" fill="currentColor" fill-opacity="0.75">SHOW_DRAFTS=true</text>

  <line x1="330" y1="53" x2="388" y2="53" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="390" y="30" width="80" height="46" rx="10" fill="currentColor" fill-opacity="0.14" stroke="currentColor" stroke-width="1.5" />
  <text x="430" y="58" font-size="11.5" text-anchor="middle" fill="currentColor">preview</text>

  <!-- Row 2: main -->
  <rect x="10" y="150" width="120" height="46" rx="10" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" />
  <text x="70" y="178" font-size="12" text-anchor="middle" fill="currentColor">main</text>

  <line x1="130" y1="173" x2="188" y2="173" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="190" y="140" width="140" height="66" rx="10" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" />
  <text x="260" y="168" font-size="12" text-anchor="middle" fill="currentColor">CI build</text>
  <text x="260" y="184" font-size="10.5" text-anchor="middle" fill="currentColor" fill-opacity="0.75">SHOW_DRAFTS=false</text>

  <line x1="330" y1="173" x2="388" y2="173" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="390" y="150" width="80" height="46" rx="10" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5" />
  <text x="430" y="178" font-size="11.5" text-anchor="middle" fill="currentColor">prod</text>
</svg>
