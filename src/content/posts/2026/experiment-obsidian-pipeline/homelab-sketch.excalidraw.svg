    <path d="M188 227 C182 234, 179 238, 172 240 C180 243, 186 244, 191 238" stroke="#1e1e1e" stroke-width="1.3" fill="#1e1e1e" />

    <!-- connector: switch -> nas (down) -->
    <path d="M420 152 C419 180, 421 208, 420 234" stroke="#1e1e1e" stroke-width="1.3" />
    <path d="M412 220 C415 228, 420 234, 420 234 C420 234, 425 228, 428 220" stroke="#1e1e1e" stroke-width="1.3" fill="#1e1e1e" />

    <!-- red annotation arrow + handwritten note, like a margin scribble -->
