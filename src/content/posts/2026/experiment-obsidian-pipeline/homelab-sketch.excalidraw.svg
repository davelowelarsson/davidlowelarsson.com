    <!-- pi: green box, bottom-left -->
    <path d="M60 240 C58 238, 200 236, 236 239 C238 264, 237 288, 235 312 C200 315, 100 316, 62 313 C59 288, 58 264, 60 240 Z" stroke="#2f9e44" stroke-width="1.5" />
    <path d="M62 242 C120 240, 190 241, 233 241 C234 266, 233 288, 233 310 C185 312, 110 313, 64 311 C61 288, 60 266, 62 242 Z" stroke="#2f9e44" stroke-width="1.5" />
