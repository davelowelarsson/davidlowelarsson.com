    <path d="M636 178 C640 172, 648 168, 648 168 C648 168, 646 176, 644 184" stroke="#e03131" stroke-width="1.6" fill="#e03131" />
    <text x="560" y="270" font-family="Virgil, Excalifont, 'Segoe UI Emoji', sans-serif" font-size="16" fill="#e03131" transform="rotate(-3 560 270)">add tunnel here??</text>

    <!-- title, hand-lettered, slightly tilted like a real quick sketch -->
    <text x="40" y="30" font-family="Virgil, Excalifont, 'Segoe UI Emoji', sans-serif" font-size="24" fill="#1e1e1e" transform="rotate(-0.6 40 30)">homelab v2 (draft)</text>

    <!-- underline scribble beneath the title -->
    <path d="M40 38 C110 41, 190 36, 260 39" stroke="#1e1e1e" stroke-width="1.4" />

    <!-- corner doodle: a little cloud, because every whiteboard sketch has one -->
    <path d="M600 340 C592 330, 604 320, 616 324 C620 314, 636 314, 640 324 C652 320, 662 330, 654 340 C662 348, 652 358, 640 354 C636 364, 620 364, 616 354 C604 358, 592 348, 600 340 Z" stroke="#1971c2" stroke-width="1.3" />
    <text x="628" y="342" font-family="Virgil, Excalifont, 'Segoe UI Emoji', sans-serif" font-size="14" fill="#1971c2" text-anchor="middle">cloudflare</text>
  </g>
</svg>
