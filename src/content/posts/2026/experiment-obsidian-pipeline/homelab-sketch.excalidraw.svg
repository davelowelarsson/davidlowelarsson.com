    <path d="M320 236 C318 234, 480 232, 520 236 C523 264, 522 290, 519 316 C480 319, 360 320, 322 317 C319 290, 318 264, 320 236 Z" stroke="#1e1e1e" stroke-width="1.5" />
    <path d="M322 238 C400 235, 470 237, 517 238 C519 264, 518 290, 517 314 C460 317, 370 318, 324 315 C321 288, 320 264, 322 238 Z" stroke="#1e1e1e" stroke-width="1.5" />
    <text x="420" y="284" font-family="Virgil, Excalifont, 'Segoe UI Emoji', sans-serif" font-size="20" fill="#1e1e1e" text-anchor="middle" transform="rotate(0.4 420 284)">nas</text>

    <!-- wobbly connector: router -> switch -->
    <path d="M242 100 C270 98, 290 104, 318 101" stroke="#1e1e1e" stroke-width="1.5" />
    <path d="M300 92 C310 97, 314 101, 305 108 C312 104, 318 100, 310 96" stroke="#1e1e1e" stroke-width="1.5" fill="#1e1e1e" />

    <!-- connector: switch -> pi (down-left) -->
