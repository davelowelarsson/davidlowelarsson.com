    <!-- antenna squiggles on the router, freehand -->
    <path d="M80 58 C76 44, 84 34, 78 22" stroke="#1e1e1e" stroke-width="1.3" />
    <path d="M190 58 C195 43, 187 33, 194 21" stroke="#1e1e1e" stroke-width="1.3" />

