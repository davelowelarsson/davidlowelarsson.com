<svg width="400" height="220" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <title>Stacked translucent bars representing a lint rule preset</title>
  <style>svg { color: #3f3f46; } @media (prefers-color-scheme: dark) { svg { color: #d4d4d8; } }</style>
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2fbf71" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#2fbf71" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect x="60" y="60" width="280" height="24" rx="12" fill="url(#g4)" />
  <rect x="60" y="98" width="220" height="24" rx="12" fill="url(#g4)" opacity="0.8" />
  <rect x="60" y="136" width="160" height="24" rx="12" fill="url(#g4)" opacity="0.6" />
  <rect x="60" y="174" width="100" height="24" rx="12" fill="url(#g4)" opacity="0.4" />
