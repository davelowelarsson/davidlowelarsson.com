<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>DNS as registry with tunnel routing across home lab clusters</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd" />
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#86efac" />
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <circle cx="180" cy="130" r="220" fill="#1e3a8a" opacity="0.16" />
  <circle cx="1030" cy="530" r="240" fill="#14532d" opacity="0.14" />

  <text x="64" y="72" fill="#e5e7eb" font-size="38" font-family="Menlo, Monaco, Consolas, monospace" font-weight="700">Home lab topology</text>
  <text x="64" y="106" fill="#93c5fd" font-size="22" font-family="Menlo, Monaco, Consolas, monospace">Deploy now. Move later. Routing follows DNS.</text>

  <rect x="64" y="160" width="250" height="120" rx="16" fill="url(#card)" stroke="#334155" stroke-width="2" />
  <text x="189" y="205" fill="#e5e7eb" font-size="22" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Public client</text>
  <text x="189" y="234" fill="#94a3b8" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Browser / API call</text>

  <rect x="360" y="140" width="250" height="160" rx="18" fill="url(#card)" stroke="#3b82f6" stroke-width="2" />
  <text x="485" y="186" fill="#dbeafe" font-size="22" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Cloudflare edge</text>
  <text x="485" y="214" fill="#93c5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">TLS + Access + WAF</text>
  <text x="485" y="238" fill="#93c5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">DNS zone as registry</text>
  <text x="485" y="262" fill="#93c5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">records tagged for dashboard</text>

  <rect x="660" y="160" width="240" height="120" rx="16" fill="url(#card)" stroke="#60a5fa" stroke-width="2" />
  <text x="780" y="205" fill="#dbeafe" font-size="21" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">cloudflared tunnel</text>
  <text x="780" y="234" fill="#93c5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">outbound only</text>

  <rect x="948" y="130" width="188" height="84" rx="14" fill="url(#card)" stroke="#22c55e" stroke-width="2" />
  <text x="1042" y="164" fill="#dcfce7" font-size="17" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Cluster A</text>
  <text x="1042" y="188" fill="#86efac" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Gateway + routes</text>

  <rect x="948" y="242" width="188" height="84" rx="14" fill="url(#card)" stroke="#22c55e" stroke-width="2" />
  <text x="1042" y="276" fill="#dcfce7" font-size="17" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Cluster B</text>
  <text x="1042" y="300" fill="#86efac" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Gateway + routes</text>

  <rect x="948" y="354" width="188" height="84" rx="14" fill="url(#card)" stroke="#22c55e" stroke-width="2" />
  <text x="1042" y="388" fill="#dcfce7" font-size="17" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">External service</text>
  <text x="1042" y="412" fill="#86efac" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Same DNS pattern</text>

  <rect x="360" y="350" width="320" height="180" rx="18" fill="url(#card)" stroke="#a78bfa" stroke-width="2" />
  <text x="520" y="390" fill="#ede9fe" font-size="21" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Dashboard</text>
  <text x="520" y="418" fill="#c4b5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Read zone records</text>
  <text x="520" y="442" fill="#c4b5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Show marked services</text>
  <text x="520" y="466" fill="#c4b5fd" font-size="16" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">Green when live, red when down</text>
  <text x="520" y="502" fill="#e9d5ff" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, Consolas, monospace">No second registry to maintain</text>

  <path d="M314 220 L360 220" fill="none" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M610 220 L660 220" fill="none" stroke="#93c5fd" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M900 220 L948 172" fill="none" stroke="#86efac" stroke-width="3" marker-end="url(#arrowSoft)" />
  <path d="M900 220 L948 284" fill="none" stroke="#86efac" stroke-width="3" marker-end="url(#arrowSoft)" />
  <path d="M900 220 L948 396" fill="none" stroke="#86efac" stroke-width="3" marker-end="url(#arrowSoft)" />

  <path d="M486 300 L520 350" fill="none" stroke="#c4b5fd" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="8 7" />
  <text x="550" y="320" fill="#ddd6fe" font-size="14" font-family="Menlo, Monaco, Consolas, monospace">registry read</text>

  <text x="64" y="598" fill="#94a3b8" font-size="15" font-family="Menlo, Monaco, Consolas, monospace">No inbound router ports. Placement is reversible. DNS keeps routing coherent.</text>
</svg>
