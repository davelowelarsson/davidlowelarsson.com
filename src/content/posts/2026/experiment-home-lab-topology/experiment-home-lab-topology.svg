<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <title>Internet traffic passes through Cloudflare, into a tunnel, and out to home lab services</title>
  <style>svg { color: #3f3f46; } @media (prefers-color-scheme: dark) { svg { color: #d4d4d8; } }</style>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="currentColor" />
    </marker>
  </defs>

  <rect x="10" y="87" width="90" height="46" rx="10" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.5" />
  <text x="55" y="115" font-size="12" text-anchor="middle" fill="currentColor">internet</text>

  <line x1="100" y1="110" x2="148" y2="110" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow2)" />

  <rect x="150" y="80" width="100" height="60" rx="10" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5" />
  <text x="200" y="106" font-size="11.5" text-anchor="middle" fill="currentColor">cloudflare</text>
  <text x="200" y="122" font-size="10" text-anchor="middle" fill="currentColor" fill-opacity="0.7">edge / TLS</text>

  <line x1="250" y1="110" x2="298" y2="110" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow2)" />

  <rect x="300" y="80" width="90" height="60" rx="10" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5" />
  <text x="345" y="104" font-size="11.5" text-anchor="middle" fill="currentColor">tunnel</text>
  <text x="345" y="120" font-size="9.5" text-anchor="middle" fill="currentColor" fill-opacity="0.7">cloudflared</text>

  <line x1="390" y1="110" x2="410" y2="110" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow2)" />

  <rect x="400" y="30" width="70" height="30" rx="8" fill="currentColor" fill-opacity="0.16" stroke="currentColor" stroke-width="1.2" />
  <text x="435" y="49" font-size="9.5" text-anchor="middle" fill="currentColor">grafana</text>

  <rect x="400" y="95" width="70" height="30" rx="8" fill="currentColor" fill-opacity="0.16" stroke="currentColor" stroke-width="1.2" />
  <text x="435" y="114" font-size="9.5" text-anchor="middle" fill="currentColor">home assist.</text>

  <rect x="400" y="160" width="70" height="30" rx="8" fill="currentColor" fill-opacity="0.16" stroke="currentColor" stroke-width="1.2" />
  <text x="435" y="179" font-size="9.5" text-anchor="middle" fill="currentColor">nas</text>

  <path d="M410 110 L435 60" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6" marker-end="url(#arrow2)" />
  <path d="M410 110 L435 175" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.6" marker-end="url(#arrow2)" />

  <text x="230" y="185" font-size="9.5" text-anchor="middle" fill="currentColor" fill-opacity="0.6">no forwarded ports on the router</text>
</svg>
