<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
  <title>Abstract overlapping translucent layers representing routing precedence</title>
  <style>svg { color: #3f3f46; } @media (prefers-color-scheme: dark) { svg { color: #d4d4d8; } }</style>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6821f" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#f6821f" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c8bf5" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#4c8bf5" stop-opacity="0.08" />
    </linearGradient>
  </defs>
  <rect x="30" y="40" width="220" height="140" rx="18" fill="url(#g2)" />
  <rect x="150" y="30" width="220" height="140" rx="18" fill="url(#g1)" />
  <circle cx="200" cy="100" r="6" fill="currentColor" opacity="0.7" />
  <circle cx="230" cy="130" r="4" fill="currentColor" opacity="0.5" />
  <circle cx="170" cy="140" r="3" fill="currentColor" opacity="0.4" />
</svg>
