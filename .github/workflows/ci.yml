name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      HAS_CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Build with drafts visible
        run: npm run build
        env:
          SHOW_DRAFTS: 'true'
          CF_ANALYTICS_TOKEN: ${{ vars.CF_ANALYTICS_TOKEN || '' }}
      - name: Upload preview version
        id: upload
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload
      - name: Comment preview URL on PR
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_URL: ${{ steps.upload.outputs.deployment-url }}
          CMD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          URL="$DEPLOYMENT_URL"
          if [ -z "$URL" ]; then
            URL=$(printf '%s' "$CMD_OUTPUT" | grep -oE 'https://[A-Za-z0-9-]+\.[A-Za-z0-9-]+\.workers\.dev' | head -1)
          fi
          if [ -z "$URL" ]; then
            echo "::warning::No preview URL found in wrangler output"
            exit 0
          fi
          BODY="🔍 **Preview deployment** (drafts visible): $URL

          Built from \`${{ github.event.pull_request.head.sha }}\`. This comment is updated on every push."
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --edit-last --create-if-none \
            --body "$BODY"
      - name: Skipped deploy notice
        if: env.HAS_CLOUDFLARE_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN not configured — preview deploy skipped."

  deploy-production:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Build for production
        run: npm run build
        env:
          SHOW_DRAFTS: 'false'
          CF_ANALYTICS_TOKEN: ${{ vars.CF_ANALYTICS_TOKEN || '' }}
      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Skipped deploy notice
        if: env.HAS_CLOUDFLARE_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN not configured — production deploy skipped."
