name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # paths-filter lists PR files via the REST API
    outputs:
      app: ${{ steps.decide.outputs.app }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # 'every': a file counts only if it matches ALL rules, so the
          # '**' + '!docs/**' … denylist actually subtracts docs paths. With
          # the default 'some', '**' alone matches everything and nothing is
          # ever excluded (the filter would be a silent no-op).
          predicate-quantifier: 'every'
          # On push to main, diff against the commit before the push (long-lived
          # branch mode). Empty on PR → detect against the PR base via the API.
          base: ${{ github.event_name == 'push' && github.ref_name || '' }}
          filters: .github/paths-filter.yml
      - id: decide
        # Always run full pipeline on manual dispatch; otherwise trust the filter.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.app }}" = "true" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    # Always run so this REQUIRED check always reports a conclusion. A required
    # check that is *skipped* (which is what a false job-level `if` produces) can
    # be treated as passing by branch protection — so if change-detection itself
    # failed, we fail here explicitly rather than letting a PR merge untested.
    if: ${{ always() }}
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.result != 'success'
        run: |
          echo "::error::change-detection (changes job) did not succeed: ${{ needs.changes.result }}"
          exit 1
      - if: needs.changes.outputs.app == 'true'
        uses: actions/checkout@v7
      - if: needs.changes.outputs.app == 'true'
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
      - if: needs.changes.outputs.app == 'true'
        run: npm ci
      - if: needs.changes.outputs.app == 'true'
        run: npm run lint
      - if: needs.changes.outputs.app == 'true'
        run: npm run typecheck
      - if: needs.changes.outputs.app == 'true'
        run: npm test
      - if: needs.changes.outputs.app == 'true'
        run: npx playwright install --with-deps chromium
      - if: needs.changes.outputs.app == 'true'
        run: npm run e2e
      - if: needs.changes.outputs.app != 'true' && needs.changes.result == 'success'
        run: echo "::notice::Docs-only change — build, test, and e2e skipped."

  deploy-preview:
    if: github.event_name == 'pull_request' && needs.changes.outputs.app == 'true'
    needs: [changes, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      HAS_CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Build with drafts visible
        run: npm run build
        env:
          SHOW_DRAFTS: 'true'
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ vars.CLOUDFLARE_ANALYTICS_TOKEN || '' }}
      - name: Upload preview version
        id: upload
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --preview-alias gives a STABLE per-PR URL (pr-N-...) that always
          # points at the branch's newest version — open tabs never go stale.
          command: versions upload --preview-alias pr-${{ github.event.pull_request.number }}
      - name: Comment preview URL on PR
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_URL: ${{ steps.upload.outputs.deployment-url }}
          CMD_OUTPUT: ${{ steps.upload.outputs.command-output }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          URL="$DEPLOYMENT_URL"
          if [ -z "$URL" ]; then
            URL=$(printf '%s' "$CMD_OUTPUT" | grep -oE 'https://[A-Za-z0-9-]+\.[A-Za-z0-9-]+\.workers\.dev' | head -1)
          fi
          if [ -z "$URL" ]; then
            echo "::warning::No preview URL found in wrangler output"
            exit 0
          fi
          # Stable alias URL: swap the per-version hash prefix for pr-N.
          STABLE=$(printf '%s' "$URL" | sed -E "s|https://[a-z0-9]+-|https://pr-${PR_NUMBER}-|")
          BODY="🔍 **Preview**: $STABLE
          _Always shows the latest push on this PR — safe to keep open._

          This exact commit (\`${{ github.event.pull_request.head.sha }}\`): $URL"
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --edit-last --create-if-none \
            --body "$BODY"
      - name: Skipped deploy notice
        if: env.HAS_CLOUDFLARE_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN not configured — preview deploy skipped."

  deploy-production:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.changes.outputs.app == 'true'
    needs: [changes, quality]
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Build for production
        run: npm run build
        env:
          SHOW_DRAFTS: 'false'
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ vars.CLOUDFLARE_ANALYTICS_TOKEN || '' }}
      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Skipped deploy notice
        if: env.HAS_CLOUDFLARE_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN not configured — production deploy skipped."
